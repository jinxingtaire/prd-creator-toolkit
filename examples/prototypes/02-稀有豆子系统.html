<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>稀有豆子系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 36px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .beans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }
        .bean-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .bean-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.2);
        }
        .bean-type {
            font-size: 14px;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .bean-name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }
        .bean-preview {
            width: 120px;
            height: 120px;
            margin: 20px auto;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            position: relative;
        }
        .bean-normal {
            background: #ff6b6b;
        }
        .bean-gradient {
            background: linear-gradient(135deg, #ff6b6b 0%, #ffd93d 100%);
            animation: gradient-rotate 3s ease infinite;
        }
        .bean-sparkle {
            background: #ffd93d;
            animation: sparkle 1.5s ease infinite;
        }
        .bean-glow {
            background: #4ecdc4;
            box-shadow: 0 0 30px #4ecdc4;
            animation: glow-pulse 2s ease infinite;
        }
        .bean-rainbow {
            background: linear-gradient(135deg, #ff6b6b 0%, #ffd93d 25%, #4ecdc4 50%, #667eea 75%, #ff6b6b 100%);
            background-size: 200% 200%;
            animation: rainbow-flow 3s linear infinite;
        }
        @keyframes gradient-rotate {
            0%, 100% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(30deg); }
        }
        @keyframes sparkle {
            0%, 100% { box-shadow: 0 0 0 rgba(255, 217, 61, 0); }
            50% { box-shadow: 0 0 30px rgba(255, 217, 61, 0.8), 0 0 60px rgba(255, 217, 61, 0.4); }
        }
        @keyframes glow-pulse {
            0%, 100% { box-shadow: 0 0 20px #4ecdc4; }
            50% { box-shadow: 0 0 40px #4ecdc4, 0 0 60px #4ecdc4; }
        }
        @keyframes rainbow-flow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        .bean-effect {
            font-size: 14px;
            color: #666;
            margin: 15px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            text-align: center;
        }
        .bean-price {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .price-tag {
            font-size: 18px;
            font-weight: bold;
        }
        .price-free {
            color: #4ecdc4;
        }
        .price-diamond {
            color: #667eea;
        }
        .price-vip {
            color: #ffd93d;
        }
        .badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-free {
            background: #d4edda;
            color: #155724;
        }
        .badge-vip {
            background: linear-gradient(135deg, #ffd93d 0%, #ff6b6b 100%);
            color: white;
        }
        .comparison {
            background: white;
            border-radius: 16px;
            padding: 40px;
            margin-top: 40px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }
        .comparison h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        .comparison-item {
            text-align: center;
        }
        .comparison-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #666;
        }
        .comparison-preview {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
        }
        .preview-normal {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
        }
        .preview-vip {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }
        .preview-vip::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shine 3s infinite;
        }
        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }
        .feature-list {
            text-align: left;
            margin-top: 20px;
        }
        .feature-item {
            padding: 8px 0;
            color: #666;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .feature-item.disabled {
            color: #ccc;
            text-decoration: line-through;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ 稀有豆子系统</h1>

        <div class="beans-grid">
            <div class="bean-card">
                <div class="bean-type">普通豆子</div>
                <div class="bean-name">标准色豆</div>
                <div class="bean-preview bean-normal">●</div>
                <div class="bean-effect">纯色，无特效</div>
                <div class="bean-price">
                    <span class="price-tag price-free">免费</span>
                    <span class="badge badge-free">67色全免费</span>
                </div>
            </div>

            <div class="bean-card">
                <div class="bean-type">稀有豆子</div>
                <div class="bean-name">渐变豆</div>
                <div class="bean-preview bean-gradient">●</div>
                <div class="bean-effect">颜色渐变动画效果</div>
                <div class="bean-price">
                    <span class="price-tag price-diamond">10钻/颗</span>
                    <span class="badge badge-vip">VIP免费</span>
                </div>
            </div>

            <div class="bean-card">
                <div class="bean-type">稀有豆子</div>
                <div class="bean-name">闪光豆</div>
                <div class="bean-preview bean-sparkle">●</div>
                <div class="bean-effect">星光闪烁特效</div>
                <div class="bean-price">
                    <span class="price-tag price-diamond">20钻/颗</span>
                    <span class="badge badge-vip">VIP免费</span>
                </div>
            </div>

            <div class="bean-card">
                <div class="bean-type">稀有豆子</div>
                <div class="bean-name">夜光豆</div>
                <div class="bean-preview bean-glow">●</div>
                <div class="bean-effect">夜间发光效果</div>
                <div class="bean-price">
                    <span class="price-tag price-diamond">30钻/颗</span>
                    <span class="badge badge-vip">VIP免费</span>
                </div>
            </div>

            <div class="bean-card">
                <div class="bean-type">传说豆子</div>
                <div class="bean-name">彩虹豆</div>
                <div class="bean-preview bean-rainbow">●</div>
                <div class="bean-effect">七彩流光特效</div>
                <div class="bean-price">
                    <span class="price-tag price-vip">VIP专属</span>
                    <span class="badge badge-vip">不可购买</span>
                </div>
            </div>
        </div>

        <div class="comparison">
            <h2>普通作品 vs VIP作品</h2>
            <div class="comparison-grid">
                <div class="comparison-item">
                    <div class="comparison-title">普通用户作品</div>
                    <div class="comparison-preview preview-normal">
                        <div style="display: grid; grid-template-columns: repeat(5, 30px); gap: 4px;">
                            <div style="width: 30px; height: 30px; background: #ff6b6b; border-radius: 50%;"></div>
                            <div style="width: 30px; height: 30px; background: #ff6b6b; border-radius: 50%;"></div>
                            <div style="width: 30px; height: 30px; background: #ff6b6b; border-radius: 50%;"></div>
                            <div style="width: 30px; height: 30px; background: #ff6b6b; border-radius: 50%;"></div>
                            <div style="width: 30px; height: 30px; background: #ff6b6b; border-radius: 50%;"></div>
                            <div style="width: 30px; height: 30px; background: #ff6b6b; border-radius: 50%;"></div>
                            <div style="width: 30px; height: 30px; background: #ffd93d; border-radius: 50%;"></div>
                            <div style="width: 30px; height: 30px; background: #ffd93d; border-radius: 50%;"></div>
                            <div style="width: 30px; height: 30px; background: #ffd93d; border-radius: 50%;"></div>
                            <div style="width: 30px; height: 30px; background: #ff6b6b; border-radius: 50%;"></div>
                        </div>
                    </div>
                    <div class="feature-list">
                        <div class="feature-item">✅ 67种标准色</div>
                        <div class="feature-item disabled">❌ 无特效</div>
                        <div class="feature-item disabled">❌ 普通白框</div>
                        <div class="feature-item disabled">❌ 无徽章</div>
                    </div>
                </div>

                <div class="comparison-item">
                    <div class="comparison-title">VIP用户作品</div>
                    <div class="comparison-preview preview-vip">
                        <div style="display: grid; grid-template-columns: repeat(5, 30px); gap: 4px; position: relative; z-index: 1;">
                            <div class="bean-preview bean-rainbow" style="width: 30px; height: 30px; margin: 0; font-size: 20px;">●</div>
                            <div class="bean-preview bean-sparkle" style="width: 30px; height: 30px; margin: 0; font-size: 20px;">●</div>
                            <div class="bean-preview bean-gradient" style="width: 30px; height: 30px; margin: 0; font-size: 20px;">●</div>
                            <div class="bean-preview bean-glow" style="width: 30px; height: 30px; margin: 0; font-size: 20px;">●</div>
                            <div class="bean-preview bean-rainbow" style="width: 30px; height: 30px; margin: 0; font-size: 20px;">●</div>
                            <div class="bean-preview bean-sparkle" style="width: 30px; height: 30px; margin: 0; font-size: 20px;">●</div>
                            <div class="bean-preview bean-gradient" style="width: 30px; height: 30px; margin: 0; font-size: 20px;">●</div>
                            <div class="bean-preview bean-glow" style="width: 30px; height: 30px; margin: 0; font-size: 20px;">●</div>
                            <div class="bean-preview bean-rainbow" style="width: 30px; height: 30px; margin: 0; font-size: 20px;">●</div>
                            <div class="bean-preview bean-sparkle" style="width: 30px; height: 30px; margin: 0; font-size: 20px;">●</div>
                        </div>
                    </div>
                    <div class="feature-list">
                        <div class="feature-item">✅ 67种标准色</div>
                        <div class="feature-item">✅ 稀有豆子无限用</div>
                        <div class="feature-item">✅ 彩虹动态边框</div>
                        <div class="feature-item">✅ VIP金色徽章</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
